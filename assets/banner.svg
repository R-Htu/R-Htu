    <text x="0" y="66" fill="#00d5ff" font-size="16">LOOP:INF</text>
  </g>

  <g transform="translate(540 94)" filter="url(#softGlow)">
    <path class="pulse" d="M160 0L286 72V216L160 288L34 216V72L160 0Z" fill="#02140f" fill-opacity="0.72" stroke="#00ff99" stroke-width="2.5"/>
    <path d="M160 45L246 94V194L160 244L74 194V94L160 45Z" fill="#06241b" stroke="#00d5ff" stroke-opacity="0.46" stroke-width="2"/>
    <text x="160" y="118" text-anchor="middle" class="mono" fill="#00ff99" font-size="18">O - O - O</text>
    <text x="160" y="148" text-anchor="middle" class="mono" fill="#7dffcb" font-size="16">DESIGN.CODE</text>
    <text x="160" y="174" text-anchor="middle" class="mono" fill="#7dffcb" font-size="16">DEBUG.LIFE</text>
    <text x="160" y="200" text-anchor="middle" class="mono" fill="#7dffcb" font-size="16">REPEAT...</text>
    <text x="160" y="230" text-anchor="middle" class="mono" fill="#00ff99" font-size="18">O - O - O</text>
  </g>

  <g class="ui" text-anchor="middle">
    <text x="700" y="42" fill="#00ff99" font-size="42" font-weight="800">R-Htu</text>
    <text x="700" y="383" fill="#c8fff0" font-size="24" font-weight="700">Full-Stack Developer // Creative Designer // Traveler From Another Dimension</text>
  </g>

  <g filter="url(#softGlow)">
    <circle class="floatA" cx="112" cy="224" r="5" fill="#00ff99"/>
    <circle class="floatB" cx="370" cy="174" r="5" fill="#7dffcb"/>
    <circle class="floatA" cx="530" cy="284" r="8" fill="#00d5ff"/>
