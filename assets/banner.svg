  <path class="dash" d="M56 72H430L456 52L474 86L504 72H1344" stroke="url(#signal)" stroke-width="2"/>
  <path class="dash" d="M56 348H392L426 316L452 368L480 348H1344" stroke="url(#signal)" stroke-opacity="0.55" stroke-width="2"/>

  <g class="mono" font-size="15" fill="#00d5ff" opacity="0.78">
