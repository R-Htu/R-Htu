<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="420" fill="#010806"/>

  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00ff99" stop-opacity="0.42"/>
      <stop offset="0.45" stop-color="#00d5ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#010806" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00ff99"/>
      <stop offset="0.5" stop-color="#00d5ff"/>
      <stop offset="1" stop-color="#b7ff4a"/>
    </linearGradient>
    <filter id="softGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="74" height="74" patternUnits="userSpaceOnUse">
      <path d="M74 0H0V74" stroke="#00ff99" stroke-opacity="0.055"/>
    </pattern>
  </defs>

  <style>
    .mono { font-family: Consolas, Monaco, monospace; }
    .ui { font-family: Segoe UI, Arial, sans-serif; }
    .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
    .floatA { animation: floatA 5s ease-in-out infinite; }
    .floatB { animation: floatB 6.2s ease-in-out infinite; }
    .dash { stroke-dasharray: 18 14; animation: dash 9s linear infinite; }
    .blink { animation: blink 1.5s steps(2) infinite; }
    @keyframes pulse { 0%,100% { opacity: .55; transform: scale(1); } 50% { opacity: 1; transform: scale(1.045); } }
    @keyframes floatA { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }
    @keyframes floatB { 0%,100% { transform: translateY(0); } 50% { transform: translateY(14px); } }
    @keyframes dash { to { stroke-dashoffset: -240; } }
    @keyframes blink { 0%,48% { opacity: 1; } 49%,100% { opacity: .18; } }
  </style>

  <rect width="1400" height="420" fill="url(#grid)"/>
  <circle class="pulse" cx="700" cy="210" r="250" fill="url(#coreGlow)"/>

  <g stroke="#00ff99" stroke-opacity="0.16">
    <path d="M0 116L220 250L500 92L700 210L1000 70L1400 288"/>
    <path d="M0 310L280 204L520 332L700 210L928 322L1400 126"/>
    <path d="M228 0L246 420M692 0L700 420M1160 0L1132 420"/>
