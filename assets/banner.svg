    <text x="0" y="34" fill="#00ff99" font-size="26" font-weight="700">LOVE++</text>
    <text x="0" y="66" fill="#00d5ff" font-size="16">TEMP:WARM</text>
  </g>

  <g transform="translate(1058 286)" class="mono">
