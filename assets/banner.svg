    <circle class="floatA" cx="982" cy="266" r="7" fill="#00ff99"/>
    <circle class="floatB" cx="1242" cy="206" r="6" fill="#b7ff4a"/>
    <circle class="blink" cx="1370" cy="34" r="9" fill="#00ff99"/>
