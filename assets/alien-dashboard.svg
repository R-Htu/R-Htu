<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="520" rx="18" fill="#070a12"/>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#101827"/>
      <stop offset="1" stop-color="#090d16"/>
    </linearGradient>
    <linearGradient id="acid" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#8bff5a"/>
      <stop offset="0.45" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="wormhole" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8bff5a" stop-opacity="0.34"/>
      <stop offset="0.48" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#070a12" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#7dd3fc" stroke-opacity="0.06"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="520" fill="url(#grid)"/>
  <circle cx="600" cy="260" r="220" fill="url(#wormhole)"/>
  <rect x="26" y="26" width="1148" height="468" rx="16" stroke="#334155" stroke-width="2"/>
  <path d="M55 86H1145" stroke="url(#acid)" stroke-width="2"/>

  <text x="60" y="62" fill="#e5f7ff" font-family="Consolas, monospace" font-size="22" font-weight="700">R-Htu // Interdimensional Build Console</text>
  <text x="920" y="62" fill="#8bff5a" font-family="Consolas, monospace" font-size="16">SIGNAL: VERY SUSPICIOUS</text>

  <g transform="translate(60 120)">
