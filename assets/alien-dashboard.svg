  </g>

  <g transform="translate(610 312)">
    <text x="0" y="0" fill="#8bff5a" font-family="Segoe UI, Arial" font-size="19" font-weight="700">Contribution Wormhole</text>
    <path d="M0 118C40 24 78 82 116 54C154 26 190 126 230 78C270 30 308 52 346 42C384 32 420 92 466 36"
