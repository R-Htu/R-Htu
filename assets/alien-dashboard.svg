    <rect x="0" y="26" width="420" height="18" rx="9" fill="#1f2937"/>
    <rect x="0" y="26" width="138" height="18" rx="9" fill="#22d3ee"/>
    <rect x="138" y="26" width="108" height="18" fill="#8bff5a"/>
    <rect x="246" y="26" width="78" height="18" fill="#f97316"/>
    <rect x="324" y="26" width="62" height="18" fill="#a78bfa"/>
    <rect x="386" y="26" width="34" height="18" rx="9" fill="#f472b6"/>
