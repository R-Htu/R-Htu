    <text x="22" y="36" fill="#8bff5a" font-family="Segoe UI, Arial" font-size="20" font-weight="700">Mission Status</text>
    <text x="22" y="72" fill="#cbd5e1" font-family="Consolas, monospace" font-size="16">coffee_fuel: 97%</text>
    <text x="22" y="102" fill="#cbd5e1" font-family="Consolas, monospace" font-size="16">bugs_detected: probably</text>
    <text x="22" y="132" fill="#cbd5e1" font-family="Consolas, monospace" font-size="16">deploy_mood: brave</text>
  </g>

  <g transform="translate(442 112)" filter="url(#glow)">
