    <ellipse cx="122" cy="130" rx="23" ry="34" fill="#8bff5a"/>
    <ellipse cx="194" cy="130" rx="23" ry="34" fill="#8bff5a"/>
    <circle cx="129" cy="130" r="7" fill="#020617"/>
    <circle cx="187" cy="130" r="7" fill="#020617"/>
    <path d="M126 194C148 212 172 212 194 194" stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>
    <path d="M70 78C28 30 40 8 104 50" stroke="#f472b6" stroke-width="4" stroke-linecap="round"/>
    <path d="M246 78C288 30 276 8 212 50" stroke="#f472b6" stroke-width="4" stroke-linecap="round"/>
    <path d="M86 250C118 290 198 290 230 250" stroke="#334155" stroke-width="3"/>
