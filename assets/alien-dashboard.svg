    <text x="22" y="36" fill="#22d3ee" font-family="Segoe UI, Arial" font-size="20" font-weight="700">Dimensional Stack</text>
    <text x="22" y="72" fill="#cbd5e1" font-family="Consolas, monospace" font-size="16">React Native  // mobile portal</text>
    <text x="22" y="102" fill="#cbd5e1" font-family="Consolas, monospace" font-size="16">Next.js       // web ship</text>
    <text x="22" y="132" fill="#cbd5e1" font-family="Consolas, monospace" font-size="16">Firebase      // data nebula</text>
  </g>

